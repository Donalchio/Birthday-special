<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1">

<title>Memory Videos</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

min-height:100dvh;

background:
url("bg.png");

background-size:cover;

background-position:center;

padding:20px;

display:flex;

justify-content:center;

align-items:center;

font-family:Arial;

overflow-y:auto;

}

.container{

width:100%;

max-width:850px;

display:flex;

flex-direction:column;

align-items:center;

gap:18px;

}

.title{

font-size:
clamp(
26px,
5vw,
42px
);

color:white;

text-align:center;

}

video{

width:100%;

max-height:68vh;

display:none;

border-radius:20px;

background:black;

}

.buttons{

width:100%;

display:grid;

gap:12px;

}

button{

padding:16px;

border:none;

border-radius:40px;

font-size:18px;

background:

linear-gradient(
45deg,
#ffbfd9,
#d8a0ff
);

color:white;

cursor:pointer;

}

@media(max-width:768px){

video{

max-height:55vh;

}

}

</style>

</head>

<body>

<audio
id="bg"
loop
preload="auto">

<source
src="bad.mp4"
type="audio/mp4">

</audio>

<div
class="container">

<div
class="title">

🎬 FOR YOU MY BABY GIRL

</div>

<video
id="player"
controls>

</video>

<div
class="buttons">

<button
onclick="playVideo('hervideo.mp4')">

▶ VIDEO 1

</button>

<button
onclick="playVideo('myvideo.mp4')">

▶ VIDEO 2

</button>

<button
onclick="playVideo('myvideo2.mp4')">

▶ VIDEO 3

</button>

</div>

</div>

<script>

const player=
document.getElementById(
"player"
);

const bg=
document.getElementById(
"bg"
);

let pausedTime=0;

/* continue music */

window.onload=()=>{

const saved=

sessionStorage.getItem(
"musicTime"
);

if(saved){

bg.currentTime=
Number(saved);

}

bg.play()
.catch(()=>{});

/* update continuously */

setInterval(()=>{

if(

!bg.paused

){

sessionStorage.setItem(

"musicTime",

bg.currentTime

);

}

},250);

};

function playVideo(file){

pausedTime=

bg.currentTime;

/* stop bg */

bg.pause();

/* show video */

player.style.display=
"block";

player.src=
file;

player.load();

player.play()
.catch(()=>{});

}

player.addEventListener(

"ended",

()=>{

bg.currentTime=
pausedTime;

bg.play()
.catch(()=>{});

}

);

</script>

</body>

</html>
